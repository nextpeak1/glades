<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glades Flying</title>
    <style>
        /* Minimalist, fast-loading CSS */
        :root {
            --bg-color: #2b4162;         /* Twilight slate blue to contrast white mountains */
            --text-main: #f8f9fa;        /* Crisp white text */
            --text-muted: #a3b1c6;       /* Soft blue-grey for subtitle */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        .artwork {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 2rem auto;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.3rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
            font-weight: 300;
        }

        /* Responsive adjustments for mobile devices */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Inline Vector Graphic (SVG) -->
        <div class="artwork">
            <svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Reusable Tree Definition -->
                <defs>
                    <polygon id="tree" points="0,-15 10,15 -10,15" fill="#154c29" />
                    <polygon id="tree-small" points="0,-10 7,10 -7,10" fill="#0d331b" />
                </defs>

                <!-- White Mountain Background (Main Peak) -->
                <!-- Peak at (200, 30), Left Base at (20, 250), Right Base at (380, 250) -->
                <polygon points="20,250 200,30 380,250" fill="#ffffff" />
                
                <!-- Secondary lower peak to add depth -->
                <!-- Peak at (80, 140), Left Base at (0, 250), Right Base at (180, 250) -->
                <polygon points="0,250 80,140 180,250" fill="#e9ecef" />

                <!-- Ski Tracks (Dotted Black Line) -->
                <!-- Placed before the trees and weaving precisely through the empty gaps -->
                <path d="M 200,30 
                         C 190,60 160,80 160,110 
                         C 160,140 230,150 230,190 
                         C 230,220 190,220 190,250" 
                      fill="none" 
                      stroke="#000000" 
                      stroke-width="3" 
                      stroke-linecap="round" 
                      stroke-dasharray="6,8" />

                <!-- Carefully Mapped Dense Trees (Inside Mountain Bounds & Avoiding Track) -->
                
                <!-- High altitude (Peak area) -->
                <use href="#tree-small" x="200" y="75" />
                <use href="#tree-small" x="220" y="85" />
                
                <!-- Upper-Mid section -->
                <use href="#tree-small" x="140" y="110" />
                <use href="#tree" x="185" y="115" />
                <use href="#tree" x="210" y="105" />
                <use href="#tree-small" x="240" y="120" />
                
                <!-- Mid section -->
                <use href="#tree-small" x="80" y="150" /> <!-- On secondary peak -->
                <use href="#tree" x="115" y="150" />
                <use href="#tree" x="140" y="140" />
                <use href="#tree" x="170" y="155" />
                <use href="#tree" x="230" y="145" />
                <use href="#tree" x="260" y="160" />
                
                <!-- Lower-Mid section -->
                <use href="#tree" x="90" y="180" />
                <use href="#tree-small" x="120" y="190" />
                <use href="#tree" x="160" y="185" />
                <use href="#tree" x="195" y="195" />
                <use href="#tree" x="265" y="190" />
                <use href="#tree-small" x="300" y="185" />
                
                <!-- Bottom section -->
                <use href="#tree-small" x="40" y="225" />
                <use href="#tree" x="65" y="240" />
                <use href="#tree" x="100" y="220" />
                <use href="#tree" x="135" y="235" />
                <use href="#tree" x="165" y="240" />
                <use href="#tree" x="225" y="235" />
                <use href="#tree" x="270" y="225" />
                <use href="#tree" x="310" y="240" />
                <use href="#tree-small" x="345" y="230" />
            </svg>
        </div>

        <h1>Glades Flying</h1>
        <p>Carving tracks through dense mountain timber.</p>

    </div>

</body>
</html>
