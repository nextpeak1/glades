<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gladesflying.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080b0c;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem 2rem;
            overflow: hidden;
        }

        /* Ambient Glade Blue-Green Glow */
        .background-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.06) 0%, rgba(20, 83, 45, 0.03) 45%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        header {
            z-index: 2;
        }

        .logo {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.4s ease, letter-spacing 0.4s ease;
        }

        .logo:hover {
            color: #fff;
            letter-spacing: 0.38em;
        }

        /* Center Composition */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            z-index: 2;
            text-align: center;
            margin: 2rem 0;
        }

        .artwork-container {
            width: 320px;
            height: 320px;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Subtle drifting animation */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        .tagline {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: #f8fafc;
            max-width: 600px;
            line-height: 1.3;
            margin-bottom: 1.2rem;
        }

        .subtext {
            font-size: 0.9rem;
            color: #475569;
            letter-spacing: 0.12em;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Minimal Footer */
        footer {
            z-index: 2;
            display: flex;
            justify-content: center;
            gap: 3.5rem;
        }

        .nav-link {
            color: #475569;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .tagline {
                font-size: 1.8rem;
            }
            .artwork-container {
                width: 260px;
                height: 260px;
            }
            body {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <header>
        <a href="#" class="logo">gladesflying</a>
    </header>

    <main>
        <div class="artwork-container">
            <!-- Premium High-Contrast Alpine Glade Artwork -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
                <defs>
                    <!-- Vivid Ice-Blue Neon Track Glow -->
                    <filter id="ski-glow" x="-25%" y="-25%" width="150%" height="150%">
                        <feGaussianBlur stdDeviation="3.5" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    
                    <!-- Mountain Silhouette Gradient -->
                    <linearGradient id="mountain-fade" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#111827" stop-opacity="0.3" />
                        <stop offset="100%" stop-color="#080b0c" stop-opacity="1" />
                    </linearGradient>

                    <!-- Elegant geometric pine tree symbol (Total radius footprint ~10px) -->
                    <g id="pine-tree">
                        <rect x="-1" y="2" width="2" height="7" fill="#1e293b" />
                        <polygon points="0,-10 -6,-2 6,-2" fill="#0b0f12" stroke="#475569" stroke-width="0.8" />
                        <polygon points="0,-4 -8,4 8,4" fill="#0b0f12" stroke="#475569" stroke-width="0.8" />
                        <polygon points="0,2 -10,10 10,10" fill="#0b0f12" stroke="#475569" stroke-width="0.8" />
                    </g>
                </defs>

                <!-- Background Peak Silhouettes -->
                <path d="M 10,190 L 110,70 L 190,160 L 245,90 L 290,150" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 30,220 L 165,50 L 280,190" fill="url(#mountain-fade)" stroke="rgba(255,255,255,0.06)" stroke-width="1.2" stroke-linecap="round" />

                <!-- Layer 1: Background Forest (Distant, semi-transparent) -->
                <g id="background-forest" opacity="0.25">
                    <use href="#pine-tree" transform="translate(40, 50) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(100, 45) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(240, 50) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(35, 90) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(210, 85) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(275, 125) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(40, 175) scale(0.6)" />
                    <use href="#pine-tree" transform="translate(260, 275) scale(0.6)" />
                </g>

                <!-- Layer 2: Highly Curved Parallel Slalom Ski Tracks -->
                <!-- Designed dynamically to sweep cleanly down the center corridor, snaking around the obstacles -->
                <g stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#ski-glow)">
                    <!-- Left Track -->
                    <path d="M 147,30 
                             C 127,50   67,60   77,90 
                             C 87,120  217,110  207,140 
                             C 197,170  67,160  77,190 
                             C 87,220  217,210  207,240 
                             C 197,270 117,270  127,300" 
                          opacity="0.95"/>
                    <!-- Right Track (Perfect tracking offset) -->
                    <path d="M 153,30 
                             C 133,50   73,60   83,90 
                             C 93,120  223,110  213,140 
                             C 203,170  73,160  83,190 
                             C 93,220  223,210  213,240 
                             C 203,270 123,270  133,300" 
                          opacity="0.95"/>
                </g>

                <!-- Layer 3: Foreground Glade Trees -->
                <!-- Positioned precisely outside the track boundaries to ensure clean clearance -->
                <g id="foreground-forest" opacity="0.95">
                    <!-- Top Flank Trees -->
                    <use href="#pine-tree" transform="translate(30, 40)" />
                    <use href="#pine-tree" transform="translate(270, 40)" />
                    <use href="#pine-tree" transform="translate(50, 60)" />
                    <use href="#pine-tree" transform="translate(250, 60)" />
                    
                    <!-- Slalom Gate "Obstacle" Trees (Tracks carve around these dynamically) -->
                    <use href="#pine-tree" transform="translate(135, 80)" />  <!-- Track sweeps far Left of this -->
                    <use href="#pine-tree" transform="translate(150, 130)" /> <!-- Track sweeps far Right of this -->
                    <use href="#pine-tree" transform="translate(135, 180)" /> <!-- Track sweeps far Left of this -->
                    <use href="#pine-tree" transform="translate(150, 230)" /> <!-- Track sweeps far Right of this -->

                    <!-- Mid-Forest Glade Clusters (Framing the turns) -->
                    <use href="#pine-tree" transform="translate(40, 90)" />
                    <use href="#pine-tree" transform="translate(260, 90)" />
                    <use href="#pine-tree" transform="translate(70, 120)" />
                    <use href="#pine-tree" transform="translate(235, 110)" />
                    <use href="#pine-tree" transform="translate(65, 170)" />
                    <use href="#pine-tree" transform="translate(235, 165)" />
                    <use href="#pine-tree" transform="translate(70, 220)" />
                    <use href="#pine-tree" transform="translate(230, 220)" />
                    <use href="#pine-tree" transform="translate(60, 270)" />
                    <use href="#pine-tree" transform="translate(240, 270)" />

                    <!-- Edge Dense Tree Walls -->
                    <use href="#pine-tree" transform="translate(25, 120)" />
                    <use href="#pine-tree" transform="translate(30, 160)" />
                    <use href="#pine-tree" transform="translate(20, 200)" />
                    <use href="#pine-tree" transform="translate(35, 240)" />
                    <use href="#pine-tree" transform="translate(25, 280)" />
                    <use href="#pine-tree" transform="translate(275, 120)" />
                    <use href="#pine-tree" transform="translate(270, 160)" />
                    <use href="#pine-tree" transform="translate(280, 200)" />
                    <use href="#pine-tree" transform="translate(265, 240)" />
                    <use href="#pine-tree" transform="translate(275, 280)" />
                </g>
            </svg>
        </div>
        
        <h1 class="tagline">The perfect line through endless timber.</h1>
        <p class="subtext"></p>
    </main>

    <footer>
        <a href="#" class="nav-link"></a>
    </footer>

</body>
</html>
