<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glades Flying</title>
    <style>
        /* Minimalist, fast-loading CSS */
        :root {
            --bg-color: #2b4162;         /* Twilight slate blue to contrast white mountains */
            --text-main: #f8f9fa;        /* Crisp white text */
            --text-muted: #a3b1c6;       /* Soft blue-grey for subtitle */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        .artwork {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 2rem auto;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.3rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
            font-weight: 300;
        }

        /* Responsive adjustments for mobile devices */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Inline Vector Graphic (SVG) -->
        <div class="artwork">
            <svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Reusable Tree Definition to keep code clean -->
                <defs>
                    <polygon id="tree" points="0,-15 10,15 -10,15" fill="#154c29" />
                    <polygon id="tree-small" points="0,-10 7,10 -7,10" fill="#0d331b" />
                </defs>

                <!-- White Mountain Background -->
                <polygon points="20,250 200,30 380,250" fill="#ffffff" />
                
                <!-- Secondary lower peak to add depth -->
                <polygon points="0,250 80,140 180,250" fill="#e9ecef" />

                <!-- Dense Trees Placed Across the Mountain -->
                <!-- Upper Glades -->
                <use href="#tree-small" x="180" y="80" />
                <use href="#tree-small" x="210" y="95" />
                <use href="#tree" x="160" y="110" />
                <use href="#tree-small" x="240" y="120" />
                
                <!-- Mid Glades -->
                <use href="#tree" x="130" y="150" />
                <use href="#tree" x="150" y="165" />
                <use href="#tree-small" x="200" y="140" />
                <use href="#tree" x="230" y="170" />
                <use href="#tree" x="260" y="155" />
                <use href="#tree-small" x="280" y="180" />

                <!-- Lower Dense Trees -->
                <use href="#tree" x="80" y="210" />
                <use href="#tree" x="100" y="190" />
                <use href="#tree" x="115" y="230" />
                <use href="#tree" x="145" y="200" />
                <use href="#tree" x="175" y="220" />
                <use href="#tree" x="220" y="210" />
                <use href="#tree" x="245" y="235" />
                <use href="#tree" x="275" y="205" />
                <use href="#tree" x="300" y="225" />
                <use href="#tree" x="330" y="240" />
                <use href="#tree" x="60" y="240" />

                <!-- Ski Tracks (Dotted Black Line) Winding Down -->
                <!-- Drawn after the trees so it overlaps them slightly where needed -->
                <path d="M 200,30 C 240,80 130,130 190,180 S 130,220 180,250" 
                      fill="none" 
                      stroke="#000000" 
                      stroke-width="3" 
                      stroke-linecap="round" 
                      stroke-dasharray="6,8" />
            </svg>
        </div>

        <h1>Glades Flying</h1>
        <p>Carving tracks through dense mountain timber.</p>

    </div>

</body>
</html>
